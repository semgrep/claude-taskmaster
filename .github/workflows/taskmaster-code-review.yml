# Auto-generated by claude-taskmaster. Do not edit manually.
name: taskmaster-code-review
on:
  workflow_call: {}
permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
jobs:
  task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          use_sticky_comment: true
          prompt: |
            You are a code review assistant for the claude-taskmaster project.
            This project generates GitHub Actions workflows from YAML task specs.
            Focus on TypeScript best practices, correct YAML generation, and GHA compatibility.


            Review the code changes in this PR. Focus on:
            - TypeScript type safety and correctness
            - Zod schema design (strict vs passthrough)
            - Generated YAML validity for GitHub Actions
            - Edge cases in task name sanitization
